<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MockBall — Best Ball Mock Draft</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0a0e17;--ink2:#111827;--ink3:#1c2333;--ink4:#252f42;
  --surface:#1a2035;--surface2:#212840;
  --line:#2e3a52;--line2:#3d4f6e;
  --text:#e8edf5;--text2:#8b9ab8;--text3:#4a5a7a;
  --gold:#f0b429;--gold2:#e8a017;
  --qb:#c084fc;--qbbg:rgba(192,132,252,.12);--qbbd:rgba(192,132,252,.4);
  --rb:#34d399;--rbbg:rgba(52,211,153,.12);--rbbd:rgba(52,211,153,.4);
  --wr:#fb923c;--wrbg:rgba(251,146,60,.12);--wrbd:rgba(251,146,60,.4);
  --te:#60a5fa;--tebg:rgba(96,165,250,.12);--tebd:rgba(96,165,250,.4);
  --stk:#f0b429;--stkbg:rgba(240,180,41,.12);
  --cor:#60a5fa;--corbg:rgba(96,165,250,.1);
  --ff:'Inter',system-ui,sans-serif;--ffh:'Space Grotesk',system-ui,sans-serif;
}
html,body{height:100%;background:var(--ink);color:var(--text);font-family:var(--ff);font-size:13px;overflow:hidden;-webkit-font-smoothing:antialiased}
.app{display:grid;grid-template-rows:52px 1fr;height:100vh}

/* HEADER */
.hdr{background:var(--ink2);border-bottom:1px solid var(--line);padding:0 18px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 12px rgba(0,0,0,.4);z-index:20;position:relative}
.logo{display:flex;align-items:center;gap:9px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--gold2),var(--gold));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 8px rgba(240,180,41,.3)}
.logo-text{font-family:var(--ffh);font-size:16px;font-weight:700;letter-spacing:-.4px}
.logo-text span{color:var(--gold)}
.hd{width:1px;height:20px;background:var(--line);flex-shrink:0}
.hbadge{background:var(--ink3);border:1px solid var(--line);border-radius:20px;padding:2px 9px;font-size:10px;font-weight:500;color:var(--text2);white-space:nowrap}
.hbadge.hot{background:rgba(240,180,41,.1);border-color:rgba(240,180,41,.3);color:var(--gold)}
.hnav{display:flex;gap:2px;margin-left:2px}
.hnav-btn{padding:4px 12px;border-radius:6px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:11px;font-weight:500;font-family:var(--ff);transition:.15s}
.hnav-btn:hover{background:var(--ink3);color:var(--text)}
.hnav-btn.on{background:var(--surface);color:var(--text);font-weight:600}
.hright{margin-left:auto;display:flex;gap:7px;align-items:center}
.hinfo{font-size:11px;color:var(--text2);white-space:nowrap;font-variant-numeric:tabular-nums}
.btn{padding:4px 12px;border-radius:6px;border:1px solid var(--line2);background:var(--surface);color:var(--text);cursor:pointer;font-size:11px;font-weight:500;transition:.12s;white-space:nowrap;font-family:var(--ff)}
.btn:hover{background:var(--surface2)}
.btn:active{transform:scale(.98)}
.btn-gold{background:linear-gradient(135deg,var(--gold2),var(--gold));border-color:transparent;color:#0a0e17;font-weight:700}
.btn-gold:hover{filter:brightness(1.08)}
.btn-ghost{background:transparent;border-color:var(--line);color:var(--text2)}
.btn-ghost:hover{border-color:var(--line2);color:var(--text)}
.btn-danger{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.35);color:#f87171}

/* SETUP */
.setup{display:flex;align-items:center;justify-content:center;height:100%;overflow-y:auto;padding:24px;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(240,180,41,.06) 0%,transparent 60%),var(--ink)}
.setup-inner{max-width:820px;width:100%}
.setup-hero{text-align:center;margin-bottom:32px}
.setup-hero h1{font-family:var(--ffh);font-size:32px;font-weight:700;letter-spacing:-1px;line-height:1.1;margin-bottom:10px;background:linear-gradient(135deg,var(--text) 40%,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.setup-hero p{color:var(--text2);font-size:13px;line-height:1.7;max-width:440px;margin:0 auto}
.setup-meta{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:24px}
.smeta{background:var(--ink2);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
.smeta-icon{font-size:20px;margin-bottom:6px}
.smeta-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-bottom:2px;font-weight:600}
.smeta-val{font-size:13px;font-weight:700}
.lineup-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:22px;justify-content:center}
.lp{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid}
.lpQB{color:var(--qb);background:var(--qbbg);border-color:var(--qbbd)}
.lpRB{color:var(--rb);background:var(--rbbg);border-color:var(--rbbd)}
.lpWR{color:var(--wr);background:var(--wrbg);border-color:var(--wrbd)}
.lpTE{color:var(--te);background:var(--tebg);border-color:var(--tebd)}
.lpFL{color:var(--text2);background:var(--ink3);border-color:var(--line)}
.slot-lbl{font-size:12px;font-weight:600;margin-bottom:8px;text-align:center}
.slot-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:5px;margin-bottom:8px}
.slot-btn{padding:10px 4px;border-radius:8px;border:1px solid var(--line);background:var(--ink2);color:var(--text);cursor:pointer;font-size:15px;font-weight:700;transition:.15s;text-align:center;font-family:var(--ffh)}
.slot-btn:hover{background:rgba(240,180,41,.1);border-color:rgba(240,180,41,.5);color:var(--gold);transform:translateY(-2px);box-shadow:0 4px 12px rgba(240,180,41,.15)}

/* Contest picker */
.contest-picker{margin-bottom:20px}
.cp-label{font-size:9px;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);font-weight:600;margin-bottom:8px;text-align:center}
.cp-options{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cp-opt{background:var(--ink2);border:2px solid var(--line);border-radius:12px;padding:14px 16px;cursor:pointer;transition:.15s;text-align:center}
.cp-opt:hover{border-color:var(--line2);background:var(--ink3)}
.cp-opt.active{border-color:var(--gold);background:rgba(240,180,41,.08)}
.cp-opt-icon{font-size:24px;margin-bottom:6px}
.cp-opt-name{font-size:13px;font-weight:700;font-family:var(--ffh);color:var(--text)}
.cp-opt-sub{font-size:10px;color:var(--text2);margin-top:2px}
.cp-opt.active .cp-opt-name{color:var(--gold)}

/* MAIN LAYOUT */
.main{display:grid;grid-template-columns:298px 1fr 240px;height:100%;overflow:hidden}

/* LEFT PANEL */
.left{background:var(--ink2);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}

/* Pick status */
.pstat{padding:10px 14px;border-bottom:1px solid var(--line);flex-shrink:0}
.ps-eye{font-size:9px;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:2px;font-weight:600}
.ps-main{font-size:14px;font-weight:700;font-family:var(--ffh)}
.ps-sub{font-size:10px;color:var(--text2);margin-top:2px}
.ps-turn{background:rgba(52,211,153,.05)}

/* Turn gap bar */
.turn-gap{padding:7px 14px;border-bottom:1px solid var(--line);flex-shrink:0;display:flex;align-items:center;gap:10px}
.tg-label{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);font-weight:600;white-space:nowrap}
.tg-pills{display:flex;gap:5px;flex:1;flex-wrap:wrap}
.tg-pill{background:var(--ink3);border:1px solid var(--line);border-radius:5px;padding:3px 8px;font-size:10px;font-weight:600;white-space:nowrap}
.tg-pill.next{background:rgba(240,180,41,.12);border-color:rgba(240,180,41,.4);color:var(--gold)}
.tg-pill.soon{background:rgba(96,165,250,.1);border-color:rgba(96,165,250,.3);color:var(--te)}

/* Scarcity bar */
.scarcity{padding:6px 14px;border-bottom:1px solid var(--line);flex-shrink:0}
.scarcity-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);font-weight:600;margin-bottom:5px}
.scarcity-row{display:flex;gap:6px}
.scar-pos{display:flex;flex-direction:column;align-items:center;flex:1;gap:2px}
.scar-pos-name{font-size:8px;font-weight:700}
.scar-track{width:100%;height:5px;background:var(--ink4);border-radius:3px;overflow:hidden}
.scar-fill{height:100%;border-radius:3px;transition:.3s}
.scar-count{font-size:9px;color:var(--text2);font-variant-numeric:tabular-nums}

/* Pick order */
.po-row{display:flex;gap:2px;padding:5px 14px;border-bottom:1px solid var(--line);overflow-x:auto;flex-shrink:0}
.po{min-width:22px;height:20px;border-radius:4px;background:var(--ink3);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;color:var(--text3)}
.po-you{background:rgba(52,211,153,.15);border-color:var(--rbbd);color:#34d399}
.po-cur{background:rgba(96,165,250,.15);border-color:var(--tebd);color:#60a5fa}

/* Search + filter */
.ctrl{display:flex;align-items:center;gap:5px;padding:5px 14px;border-bottom:1px solid var(--line);flex-shrink:0}
.ctrl input{flex:1;background:var(--ink3);border:1px solid var(--line);border-radius:6px;padding:5px 9px;color:var(--text);font-size:11px;outline:none;font-family:var(--ff)}
.ctrl input:focus{border-color:var(--tebd)}
.ctrl input::placeholder{color:var(--text3)}
.ftabs{display:flex;gap:3px;padding:4px 14px;border-bottom:1px solid var(--line);flex-shrink:0}
.ftab{padding:2px 8px;border-radius:20px;border:1px solid transparent;background:transparent;color:var(--text3);cursor:pointer;font-size:10px;font-weight:500;font-family:var(--ff);transition:.1s}
.ftab:hover{color:var(--text2)}
.ftab.on{border-color:currentColor}
.ftab.ALL.on{color:var(--text);border-color:var(--line2)}
.ftab.QB.on{color:var(--qb);border-color:var(--qb);background:var(--qbbg)}
.ftab.RB.on{color:var(--rb);border-color:var(--rb);background:var(--rbbg)}
.ftab.WR.on{color:var(--wr);border-color:var(--wr);background:var(--wrbg)}
.ftab.TE.on{color:var(--te);border-color:var(--te);background:var(--tebg)}

/* Player list */
.plist{overflow-y:auto;flex:1}
.prow{display:flex;align-items:center;gap:6px;padding:6px 14px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .08s;user-select:none}
.prow:hover{background:var(--ink3)}
.prow.gone{display:none}
.prow.gone.vis{display:flex;opacity:.2;pointer-events:none}
.padp{font-size:10px;color:var(--gold);width:28px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}
.pbadge{width:26px;text-align:center;flex-shrink:0;border-radius:4px;padding:1px 0;font-size:9px;font-weight:700}
.QB{color:var(--qb);background:var(--qbbg)}.RB{color:var(--rb);background:var(--rbbg)}.WR{color:var(--wr);background:var(--wrbg)}.TE{color:var(--te);background:var(--tebg)}
.pinfo{flex:1;min-width:0}
.pname{font-weight:500;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.pteam{font-size:10px;color:var(--gold)}
.pproj{font-size:10px;color:var(--text3);width:28px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}
.stk-badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;flex-shrink:0;color:var(--stk);background:var(--stkbg);border:1px solid rgba(240,180,41,.25)}
.cor-badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;flex-shrink:0;color:var(--cor);background:var(--corbg);border:1px solid rgba(96,165,250,.2)}
/* Value bar — replaces grade */


/* CENTER BOARD */
.center{background:var(--ink);display:flex;flex-direction:column;overflow:hidden}
.center-hdr{padding:7px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--ink2)}
.ai-bar{display:flex;align-items:center;gap:8px;padding:4px 14px;background:rgba(96,165,250,.07);border-bottom:1px solid var(--line);font-size:10px;color:var(--te);flex-shrink:0}
.dots span{animation:blink 1.2s infinite;opacity:0}.dots span:nth-child(2){animation-delay:.25s}.dots span:nth-child(3){animation-delay:.5s}
@keyframes blink{0%,80%,100%{opacity:0}35%{opacity:1}}
.board-wrap{overflow:auto;flex:1}
.board{display:grid;grid-template-columns:repeat(12,minmax(76px,1fr));min-width:912px}
.col-hdr{position:sticky;top:0;z-index:10;padding:7px 5px 6px;text-align:center;font-size:9px;font-weight:700;color:var(--text3);background:var(--ink2);border-bottom:2px solid var(--line);border-right:1px solid var(--line);text-transform:uppercase;letter-spacing:.4px;line-height:1.3}
.col-hdr.you{background:rgba(52,211,153,.07);border-bottom-color:var(--rbbd);color:#34d399}
.col-hdr .tname{font-size:8px;color:var(--gold);font-style:italic;text-transform:none;letter-spacing:0;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.col-hdr.you .tname{color:rgba(52,211,153,.55)}
.bcell{border-bottom:1px solid var(--line);border-right:1px solid var(--line);padding:4px 6px;min-height:56px;background:var(--ink2);position:relative}
.bcell.empty{background:var(--ink);opacity:.3}
.bcell.onclock{animation:cpulse 1.7s ease-in-out infinite}
@keyframes cpulse{0%,100%{background:rgba(96,165,250,.08);box-shadow:inset 0 0 0 1px rgba(96,165,250,.4)}50%{background:rgba(52,211,153,.06);box-shadow:inset 0 0 0 1px rgba(52,211,153,.4)}}
.bcell.mine{background:rgba(52,211,153,.05);border-right-color:rgba(52,211,153,.25)}
.cell-rd{font-size:8px;color:var(--text3);margin-bottom:2px}
.cell-name{font-size:10px;font-weight:600;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.cell-badge{display:inline-block;padding:1px 4px;border-radius:3px;font-size:8px;font-weight:700;margin-top:2px}
.cell-adp{font-size:8px;color:var(--gold);margin-top:1px}

/* RIGHT PANEL */
.right{background:var(--ink2);border-left:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
.rp-hdr{padding:8px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.rp-hdr-t{font-size:12px;font-weight:700;font-family:var(--ffh)}

/* Stack Tracker */
.stack-tracker{padding:8px 12px;border-bottom:1px solid var(--line);flex-shrink:0}
.st-title{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);font-weight:600;margin-bottom:7px;display:flex;align-items:center;gap:5px}
.st-empty{font-size:10px;color:var(--text3);font-style:italic}
.stack-item{margin-bottom:8px}
.stack-item:last-child{margin-bottom:0}
.si-qb{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.si-qb-name{font-size:11px;font-weight:600;color:var(--qb)}
.si-qb-team{font-size:9px;color:var(--text3)}
.si-partners{display:flex;flex-wrap:wrap;gap:3px;margin-left:2px}
.si-partner{font-size:9px;padding:1px 6px;border-radius:4px;font-weight:500}
.si-partner.drafted{background:rgba(52,211,153,.1);color:var(--rb);border:1px solid rgba(52,211,153,.25)}
.si-partner.avail{background:var(--ink3);color:var(--text2);border:1px solid var(--line);cursor:default}
.si-avail-label{font-size:8px;color:var(--text3);margin-left:2px;margin-top:2px}

/* Roster slots */
.rp-body{overflow-y:auto;flex:1;padding:5px 8px}
.rdivider{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);padding:5px 6px 3px;margin-top:3px}
.rslot{display:flex;align-items:center;gap:5px;padding:3px 6px;border-radius:5px;margin-bottom:2px;border:1px solid var(--line);background:var(--ink3);min-height:27px}
.rslot.starter{border-left:2px solid rgba(240,180,41,.4)}
.rslot-pos{font-size:9px;font-weight:700;width:28px;text-align:center;padding:1px 0;border-radius:3px;flex-shrink:0}
.rslot-name{font-size:10px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rslot-team{font-size:9px;color:var(--text3)}

/* Stat grid */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:8px;border-top:1px solid var(--line);flex-shrink:0}
.sc{background:var(--ink3);border:1px solid var(--line);border-radius:6px;padding:6px 8px}
.sc-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px;font-weight:600}
.sc-v{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums}
.build-pills{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px}
.build-pill{font-size:9px;font-weight:600;padding:1px 5px;border-radius:4px}

/* Archetype badge */
.archetype-banner{padding:8px 12px;border-top:1px solid var(--line);flex-shrink:0}
.arch-label{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);font-weight:600;margin-bottom:4px}
.arch-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(240,180,41,.1);border:1px solid rgba(240,180,41,.3);border-radius:8px;padding:5px 10px}
.arch-badge .arch-icon{font-size:14px}
.arch-badge .arch-name{font-size:11px;font-weight:700;color:var(--gold);font-family:var(--ffh)}
.arch-badge .arch-sub{font-size:9px;color:var(--text2)}

/* Opponent modal */
.opp-overlay{position:fixed;inset:0;z-index:50;background:rgba(10,14,23,.8);display:flex;align-items:center;justify-content:center;padding:24px}
.opp-card{background:var(--ink2);border:1px solid var(--line);border-radius:14px;padding:22px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto;position:relative}
.opp-card h3{font-family:var(--ffh);font-size:16px;font-weight:700;margin-bottom:14px}

/* Post-draft analysis */
.analysis-panel{position:fixed;inset:0;z-index:60;background:rgba(10,14,23,.85);display:flex;align-items:center;justify-content:center;padding:24px}
.analysis-card{background:var(--ink2);border:1px solid var(--line);border-radius:16px;padding:26px;max-width:620px;width:100%;max-height:88vh;overflow-y:auto;position:relative}
.analysis-card h3{font-family:var(--ffh);font-size:17px;font-weight:700;margin-bottom:4px}
.arch-hero{display:flex;align-items:center;gap:14px;background:rgba(240,180,41,.07);border:1px solid rgba(240,180,41,.2);border-radius:10px;padding:14px;margin-bottom:18px}
.arch-hero .arch-icon-lg{font-size:32px}
.arch-hero .arch-details h4{font-size:15px;font-weight:700;color:var(--gold);font-family:var(--ffh)}
.arch-hero .arch-details p{font-size:11px;color:var(--text2);margin-top:3px;line-height:1.5}
.ag{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.ag-card{background:var(--ink3);border-radius:8px;padding:10px 12px;border:1px solid var(--line)}
.ag-l{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:3px;font-weight:600}
.ag-v{font-size:16px;font-weight:700}
.ag-sub{font-size:10px;color:var(--text2);margin-top:1px}
.pick-tbl{background:var(--ink3);border-radius:8px;overflow:hidden;border:1px solid var(--line)}
.pt-hdr{display:grid;grid-template-columns:44px 44px 1fr 70px 60px;background:var(--ink4);border-bottom:1px solid var(--line)}
.pt-hdr span,.pt-row span{padding:7px 8px;font-size:9px}
.pt-hdr span{text-transform:uppercase;letter-spacing:.5px;font-weight:600;color:var(--text3)}
.pt-row{display:grid;grid-template-columns:44px 44px 1fr 70px 60px;border-bottom:1px solid var(--line)}
.pt-row:last-child{border-bottom:none}
.pt-row span{font-size:10px;color:var(--text2);display:flex;align-items:center}
.pt-row .bold{color:var(--text);font-weight:500}

/* History */
.history-page{height:100%;overflow-y:auto;padding:22px;background:var(--ink)}
.history-page h2{font-family:var(--ffh);font-size:19px;font-weight:700;margin-bottom:4px}
.page-sub{color:var(--text2);font-size:12px;margin-bottom:20px}
.hstat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}

function getArchetype(roster){
  if(!roster||!roster.length) return ARCHETYPES[7];
  const pc={QB:0,RB:0,WR:0,TE:0};
  roster.forEach(p=>pc[p.pos]++);

  }
  return ARCHETYPES[7];
}

let S={
  started:false,userSlot:1,pickNum:0,picks:[],
  drafted:new Set(),rosters:Array.from({length:TEAMS},()=>[]),
  filter:'ALL',search:'',aiRunning:false,done:false,
  showDrafted:false,teamNames:[],page:'setup',

// ── HISTORY ──────────────────────────────────────────────────────────────
function loadHistory(){try{return JSON.parse(localStorage.getItem('mb_hist')||'[]');}catch{return[];}}
function saveHistory(h){try{localStorage.setItem('mb_hist',JSON.stringify(h));}catch{}}
function addToHistory(e){const h=loadHistory();h.unshift(e);if(h.length>50)h.pop();saveHistory(h);}

// ── HELPERS ──────────────────────────────────────────────────────────────
function isMyTurn(){return !S.done&&teamAt(S.pickNum)===(S.userSlot-1);}
function getPool(){return S.contest==='draftkings'?DK_P:P;}
function avail(){return getPool().filter(p=>!S.drafted.has(p.id));}
function pc(r){const c={QB:0,RB:0,WR:0,TE:0};r.forEach(p=>c[p.pos]++);return c;}
function stacks(r){const t={};r.forEach(p=>{if(p.team&&p.team!=='FA')t[p.team]=(t[p.team]||0)+1;});return t;}
function qbTeams(r){const s=new Set();r.forEach(p=>{if(p.pos==='QB'&&p.team&&p.team!=='FA')s.add(p.team);});return s;}
function corTeams(r){const qt=qbTeams(r),t={};r.forEach(p=>{if(p.team&&p.team!=='FA'&&!qt.has(p.team))t[p.team]=(t[p.team]||0)+1;});const s=new Set();Object.entries(t).forEach(([tm,c])=>{if(c>=1)s.add(tm);});return s;}
function toast(msg){const e=document.getElementById('toast');e.textContent=msg;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2500);}

// ── VALUE BAR ─────────────────────────────────────────────────────────────
// Shows how much the player fell vs ADP. Not a grade — just a directional visual.
// Green = fell to you, gray = at ADP, red = reaching
function availPct(p, pickNum){
  // Estimate % chance player is still available when you pick next round.
  // Model: each team picks "near their ADP" with some variance (~±6 picks std dev).
  // Your next pick is ~TEAMS picks away (one full round in snake).
  // If player ADP >> nextPick: almost certainly gone.
  // If player ADP << nextPick: almost certainly still there.
  const nextPick = pickNum + TEAMS;      // roughly when you pick next round
  const adpGap   = p.adp - nextPick;    // positive = ADP is after your next pick (likely available)
                                         // negative = ADP is before your next pick (likely gone)
  // Use a logistic-style curve centered at adpGap=0
  // adpGap >= +18  → ~98% (they won't go for another round+ after you pick)
  // adpGap ==   0  → ~45% (coin flip — might just get sniped)
  // adpGap <= -12  → ~3%  (almost certainly gone by then)
  let pct;
  if      (adpGap >= 20) pct = 97;
  else if (adpGap >= 14) pct = 88;
  else if (adpGap >= 10) pct = 78;
  else if (adpGap >=  6) pct = 65;
  else if (adpGap >=  2) pct = 52;
  else if (adpGap >=  0) pct = 44;
  else if (adpGap >= -4) pct = 30;
  else if (adpGap >= -8) pct = 16;
  else if (adpGap >=-12) pct = 7;
  else                   pct = 2;

  // Color: green = safe to wait, yellow = risky, red = take now
  let color, label;
  if      (pct >= 75){ color='#34d399'; label='Safe'; }
  else if (pct >= 50){ color='#86efac'; label='Likely'; }
  else if (pct >= 30){ color='#f0b429'; label='Risky'; }
  else if (pct >= 15){ color='#fb923c'; label='Unlikely'; }
  else               { color='#f87171'; label='Gone'; }

  return `<div class="avail-pct" style="color:${color};min-width:38px;text-align:right;font-size:10px;font-weight:600;font-variant-numeric:tabular-nums;flex-shrink:0" title="${label} — Est. ${pct}% chance available next round">${pct}%</div>`;
}

// ── SCARCITY: players available in next ~24 picks by position ─────────────
function scarcityInWindow(pickNum){
  const windowEnd=pickNum+25;
  const av=avail();
  const counts={QB:0,RB:0,WR:0,TE:0};
  av.forEach(p=>{if(p.adp<=(windowEnd))counts[p.pos]++;});
  return counts;
}

// ── TURN GAP: picks until my next turns ───────────────────────────────────
function nextTurns(pickNum,userSlot){
  if(pickNum>=TOTAL)return[];
  const myTeam=userSlot-1;
  const gaps=[];
  for(let n=pickNum;n<Math.min(pickNum+50,TOTAL);n++){
    if(teamAt(n)===myTeam){
      gaps.push({overall:n+1,round:roundOf(n),pickInRound:n%TEAMS+1,gap:n-pickNum});
      if(gaps.length>=3)break;
    }
  }
  return gaps;
}

// ── STACK TRACKER ─────────────────────────────────────────────────────────
// For each QB on my roster, show their teammates on roster + best available stack partners
function buildStackTracker(myRoster){
  const qbs=myRoster.filter(p=>p.pos==='QB');
  if(!qbs.length)return null;
  const av=avail();
  return qbs.map(qb=>{
    const onRoster=myRoster.filter(p=>p.pos!=='QB'&&p.team===qb.team);
    const available=av.filter(p=>p.pos!=='QB'&&p.team===qb.team&&p.adp<300).slice(0,4);
    return{qb,onRoster,available};
  });
}

// ── AI PICK ───────────────────────────────────────────────────────────────
function aiPick(ti){
  const av=avail();if(!av.length)return null;
  const cur=S.pickNum+1,lo=cur-8,hi=cur+22;
  const roster=S.rosters[ti],counts=pc(roster),qbs=roster.filter(r=>r.pos==='QB');
  let pool=av.filter(p=>p.adp>=lo&&p.adp<=hi&&counts[p.pos]<CAPS[p.pos]);
  if(!pool.length)pool=av.filter(p=>counts[p.pos]<CAPS[p.pos]).slice(0,20);
  if(!pool.length)pool=av.slice(0,5);
  const round=roundOf(S.pickNum);
  const isDK=S.contest==='draftkings';
  function score(p){
    let s=-(p.adp-cur)*1.3;
    // DK full PPR: lean even harder on WRs early, QB less dominant
    if(round<=5&&p.pos==='WR')s+=(isDK?7:4);
    if(round<=5&&p.pos==='RB')s+=(isDK?3:4);
    if(p.pos==='QB'&&counts.QB===0&&round>=6&&round<=11)s+=(isDK?5:8);
    if(p.pos==='QB'&&counts.QB===0&&round>=3&&round<=5)s+=(isDK?2:4);
    if(p.pos==='TE'&&counts.TE===0&&round>=5&&round<=11)s+=6;
    qbs.forEach(q=>{if(q.team===p.team&&(p.pos==='WR'||p.pos==='TE'))s+=5;});
    s+=(Math.random()*4-2);return s;
  }
  pool.sort((a,b)=>score(b)-score(a));return pool[0];
}

// ── EXEC ─────────────────────────────────────────────────────────────────
function exec(player,ti){
  S.drafted.add(player.id);S.rosters[ti].push(player);
  S.picks.push({n:S.pickNum,ti,player});S.pickNum++;
  if(S.pickNum>=TOTAL)S.done=true;
}
function userDraft(id){
  if(S.done||S.aiRunning||!isMyTurn())return;
  const p=getPool().find(x=>x.id===id);if(!p||S.drafted.has(p.id))return;
  exec(p,S.userSlot-1);
  toast('✅ '+p.name+' · '+p.pr);
  setTimeout(runAI,150);
}
function doAuto(){
  if(S.done||S.aiRunning||!isMyTurn())return;
  const p=aiPick(S.userSlot-1);if(!p)return;
  exec(p,S.userSlot-1);toast('⚡ Auto: '+p.name);
  setTimeout(runAI,150);
}
function runAI(){
  if(S.done||isMyTurn()){
    if(S.done)finalizeDraft();else render();return;
  }
  S.aiRunning=true;updateHeader();
  const step=()=>{
    if(S.done||isMyTurn()){S.aiRunning=false;if(S.done)finalizeDraft();else render();return;}
    const ti=teamAt(S.pickNum),pk=aiPick(ti);if(pk)exec(pk,ti);
    setTimeout(step,75);
  };step();
}
function finalizeDraft(){
  const myR=S.rosters[S.userSlot-1];
  const myPicks=S.picks.filter(pk=>pk.ti===(S.userSlot-1));
  const myPc=pc(myR);
  const mySt=stacks(myR);
  const topStk=Object.entries(mySt).sort((a,b)=>b[1]-a[1])[0];
  const arch=getArchetype(myR);
  const entry={
    id:Date.now(),
    date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),
    slot:S.userSlot,
    picks:myPicks.map(pk=>({
      round:roundOf(pk.n),overall:pk.n+1,
      id:pk.player.id,name:pk.player.name,pos:pk.player.pos,
      team:pk.player.team,adp:pk.player.adp,pr:pk.player.pr
    })),
    build:`${myPc.QB}QB/${myPc.RB}RB/${myPc.WR}WR/${myPc.TE}TE`,
    archetype:{id:arch.id,icon:arch.icon,name:arch.name},
    topStack:topStk?topStk[0]:'—',
    projPts:Math.round(myR.reduce((s,p)=>s+p.proj,0))
  };
  addToHistory(entry);
  render();
  setTimeout(()=>showAnalysis(entry,myR,myPicks),400);
}

// ── ANALYSIS MODAL ────────────────────────────────────────────────────────
function showAnalysis(entry,myR,myPicks){
  const arch=ARCHETYPES.find(a=>a.id===entry.archetype.id)||ARCHETYPES[7];
  const myPc=pc(myR);
  const mySt=stacks(myR);
  const topStk=Object.entries(mySt).sort((a,b)=>b[1]-a[1])[0];
  const stackCount=topStk?topStk[1]:0;

  const pickRows=myPicks.map((pk,idx)=>{
    const pickRound=roundOf(pk.n);
    const pickOverall=pk.n+1;
    const pickInRound=pk.n%TEAMS+1;
    const pickCode=pickRound+'.'+String(pickInRound).padStart(2,'0');
    const adpDiff=(pk.n+1)-pk.player.adp;
    const diffStr=adpDiff<=0?'+'+Math.abs(adpDiff).toFixed(1):'-'+adpDiff.toFixed(1);
    const diffColor=adpDiff<=-6?'var(--rb)':adpDiff<=0?'var(--text2)':'var(--te)';
    const isStk=qbTeams(myR).has(pk.player.team)&&pk.player.pos!=='QB';

      <div class="ag-card"><div class="ag-l">QBs</div><div class="ag-v" style="color:var(--qb)">${myPc.QB}</div><div class="ag-sub">Signal callers</div></div>

// ── OPPONENT MODAL ─────────────────────────────────────────────────────────
function showOpponent(teamIdx){
  const roster=S.rosters[teamIdx];
  if(!roster.length)return;
  const name=S.teamNames[teamIdx]||'Team '+(teamIdx+1);
  const myPc=pc(roster);
  const mySt=stacks(roster);
  const topStk=Object.entries(mySt).sort((a,b)=>b[1]-a[1])[0];
  const arch=getArchetype(roster);
  const rows=roster.map(p=>`<div class="prow" style="pointer-events:none">
    <span class="padp">${p.adp.toFixed(1)}</span>
    <span class="pbadge ${p.pos}">${p.pos}</span>
    <div class="pinfo"><div class="pname">${p.name}</div><div class="pteam">${p.pr} · ${p.team}</div></div>
    <span class="pproj">${p.proj>0?Math.round(p.proj):'—'}</span>
  </div>`).join('');
  const overlay=document.createElement('div');
  overlay.className='opp-overlay';
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};
  overlay.innerHTML=`<div class="opp-card">
    <button class="btn btn-ghost" onclick="this.closest('.opp-overlay').remove()" style="position:absolute;top:14px;right:14px">✕</button>
    <h3 style="color:var(--gold)">${name}</h3>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
      <span style="font-size:18px">${arch.icon}</span>
      <div><div style="font-size:11px;font-weight:600;color:var(--gold)">${arch.name}</div>
      <div style="font-size:10px;color:var(--text2)">${myPc.QB}QB · ${myPc.RB}RB · ${myPc.WR}WR · ${myPc.TE}TE${topStk?' · Top stack: '+topStk[0]+' ×'+topStk[1]:''}</div></div>
    </div>
    ${rows}
  </div>`;
  document.getElementById('view').appendChild(overlay);
}

// ── NAV / HEADER ──────────────────────────────────────────────────────────
function navTo(page){
  S.page=page;
  document.querySelectorAll('.hnav-btn').forEach(b=>b.classList.remove('on'));
  const nb=document.getElementById('nav-'+page);if(nb)nb.classList.add('on');
  document.getElementById('view').innerHTML=(page==='history')?renderHistory():renderMain();
  updateHeader();
}
function updateHeader(){
  const hi=document.getElementById('hinfo'),ab=document.getElementById('auto-btn'),
        rb=document.getElementById('reset-btn'),tb=document.getElementById('tog-btn'),
        nav=document.getElementById('hnav');
  nav.style.display=S.started?'flex':'none';
  const cb=document.getElementById('contest-badge');
  if(cb)cb.textContent=CONTESTS[S.contest].badgeText;
  rb.style.display=S.started?'block':'none';
  tb.style.display=(S.started&&S.page==='draft')?'block':'none';
  if(!S.started){ab.style.display='none';hi.textContent='';return;}
  if(S.done){ab.style.display='none';hi.textContent='✅ Complete';}
  else{
    ab.style.display=(isMyTurn()&&!S.aiRunning&&S.page==='draft')?'block':'none';
    hi.textContent='R'+roundOf(S.pickNum)+' · #'+(S.pickNum+1)+'/'+TOTAL;
  }
}
function render(){
  const v=document.getElementById('view');
  if(!S.started)v.innerHTML=renderSetup();
  else if(S.page==='history')v.innerHTML=renderHistory();
  else v.innerHTML=renderMain();
  updateHeader();
}

// ── PLAYER LIST ───────────────────────────────────────────────────────────
function pListHTML(){
  const myR=S.rosters[S.userSlot-1],qt=qbTeams(myR),ct=corTeams(myR),myTurn=isMyTurn()&&!S.aiRunning;
  const filtered=getPool().filter(p=>{
    if(S.filter!=='ALL'&&p.pos!==S.filter)return false;
    if(S.search){const q=S.search.toLowerCase();if(!p.name.toLowerCase().includes(q)&&!p.team.toLowerCase().includes(q))return false;}
    return true;
  });
  const available=filtered.filter(p=>!S.drafted.has(p.id)).slice(0,120);
  const draftedShown=S.showDrafted?filtered.filter(p=>S.drafted.has(p.id)):[];
  return[...available,...draftedShown].map(p=>{
    const gone=S.drafted.has(p.id);
    const hasStk=!gone&&p.pos!=='QB'&&qt.has(p.team)&&p.team!=='FA';
    const hasCor=!gone&&!hasStk&&p.pos!=='QB'&&ct.has(p.team)&&p.team!=='FA';
    const goneClass=gone?'gone vis':'';
    return`<div class="prow ${goneClass}" ${myTurn&&!gone?`onclick="userDraft('${p.id}')"`:''}>
      <span class="padp">${p.adp.toFixed(1)}</span>
      <span class="pbadge ${p.pos}">${p.pos}</span>
      <div class="pinfo"><div class="pname">${p.name}</div><div class="pteam">${p.pr}${p.team!=='FA'?' · '+p.team:' · FA'}</div></div>
      ${hasStk?'<span class="stk-badge">STK</span>':hasCor?'<span class="cor-badge">COR</span>':''}
      ${!gone?availPct(p,S.pickNum):''}
      <span class="pproj">${p.proj>0?Math.round(p.proj):'—'}</span>
    </div>`;
  }).join('');
}
function reList(){const el=document.getElementById('plist');if(el)el.innerHTML=pListHTML();}
function toggleDrafted(){
  S.showDrafted=!S.showDrafted;
  const b=document.getElementById('tog-btn');
  b.textContent='👁 Drafted';b.classList.toggle('on',S.showDrafted);
  reList();
}

// ── MAIN DRAFT VIEW ───────────────────────────────────────────────────────
function renderMain(){
  const myR=S.rosters[S.userSlot-1],myPc=pc(myR),mySt=stacks(myR);
  const topStk=Object.entries(mySt).sort((a,b)=>b[1]-a[1])[0];
  const myTurn=isMyTurn()&&!S.aiRunning;
  const curTeam=S.done?-1:teamAt(S.pickNum);
  const round=roundOf(S.pickNum);
  const arch=getArchetype(myR);

  // Status
  let status;
  if(S.done){
    status=`<div class="pstat" style="background:rgba(52,211,153,.05)">
      <div class="ps-eye" style="color:#34d399">✅ DRAFT COMPLETE</div>
      <div class="ps-main">${arch.icon} ${arch.name}</div>
      <div class="ps-sub">${myPc.QB}QB · ${myPc.RB}RB · ${myPc.WR}WR · ${myPc.TE}TE</div></div>`;
  }else if(myTurn){
    status=`<div class="pstat ps-turn">
      <div class="ps-eye" style="color:#34d399">🟢 YOUR PICK</div>
      <div class="ps-main">Round ${round} · Pick ${S.pickNum%TEAMS+1}</div>
      <div class="ps-sub">Overall #${S.pickNum+1} · ${avail().length} available · ${arch.icon} ${arch.name}</div></div>`;
  }else{
    const tn=S.teamNames[curTeam]||'Team '+(curTeam+1);
    status=`<div class="pstat">
      <div class="ps-eye" style="color:${S.aiRunning?'var(--te)':'var(--text3)'}">${S.aiRunning?'🤖 AI PICKING':'⏳ ON THE CLOCK'}</div>
      <div class="ps-main" style="color:var(--gold)">${tn}</div>
      <div class="ps-sub">Round ${round} · Overall #${S.pickNum+1}</div></div>`;
  }

  // Turn gap
  let tgHtml='<div class="turn-gap"><span class="tg-label">Your picks</span><div class="tg-pills">';
  if(S.done){
    tgHtml+='<span class="tg-pill">Draft complete</span>';
  }else{
    const turns=nextTurns(S.pickNum,S.userSlot);
    if(!turns.length)tgHtml+='<span class="tg-pill">No more picks</span>';
    else turns.forEach((t,i)=>{
      const cls=i===0?'tg-pill next':i===1?'tg-pill soon':'tg-pill';
      const pickLabel=t.gap===0?'Now':t.gap===1?'Next pick':'In '+t.gap+' picks';
      const pickCode=t.round+'.'+String(t.pickInRound).padStart(2,'0');
      tgHtml+=`<span class="${cls}">${pickCode} — ${pickLabel}</span>`;
    });
  }
  tgHtml+='</div></div>';

  // Scarcity in window
  const scar=scarcityInWindow(S.pickNum);
  const maxScar=Math.max(1,...Object.values(scar));
  const posColors={QB:'var(--qb)',RB:'var(--rb)',WR:'var(--wr)',TE:'var(--te)'};
  const scarHtml=`<div class="scarcity">
    <div class="scarcity-lbl">Available in next 2 rounds</div>
    <div class="scarcity-row">
      ${['QB','RB','WR','TE'].map(pos=>`<div class="scar-pos">
        <span class="scar-pos-name" style="color:${posColors[pos]}">${pos}</span>
        <div class="scar-track"><div class="scar-fill" style="width:${Math.round(scar[pos]/maxScar*100)}%;background:${posColors[pos]}"></div></div>
        <span class="scar-count">${scar[pos]}</span>
      </div>`).join('')}
    </div>
  </div>`;

  // Pick order
  const poHTML=Array.from({length:TEAMS},(_,i)=>{
    const isYou=i===(S.userSlot-1),isCur=!S.done&&i===curTeam&&!S.aiRunning;
    return`<div class="po${isYou?' po-you':''}${isCur&&!isYou?' po-cur':''}" title="${isYou?'YOU':S.teamNames[i]}">${isYou?'YOU':i+1}</div>`;
  }).join('');

  // Board
  const pbtr=Array.from({length:TEAMS},()=>Array(ROUNDS).fill(null));
  S.picks.forEach(pk=>{pbtr[pk.ti][Math.floor(pk.n/TEAMS)]=pk.player;});
  const clockTi=S.done?-1:teamAt(S.pickNum);
  const clockRound=S.done?-1:Math.floor(S.pickNum/TEAMS);
  let boardHTML='';
  for(let t=0;t<TEAMS;t++){
    const isYou=t===(S.userSlot-1);
    const tn=S.teamNames[t]||'Team '+(t+1);
    boardHTML+=`<div class="col-hdr${isYou?' you':''}" ${!isYou&&S.rosters[t].length>0?`onclick="showOpponent(${t})" style="cursor:pointer" title="View ${tn}'s roster"`:''}>
      ${isYou?'YOU':'T'+(t+1)}<div class="tname">${tn}</div></div>`;
  }
  for(let r=0;r<ROUNDS;r++){
    for(let t=0;t<TEAMS;t++){
      const player=pbtr[t][r];
      const isYou=t===(S.userSlot-1);
      const isActive=!S.done&&t===clockTi&&r===clockRound;
      let cls='bcell';
      if(!player)cls+=' empty';
      if(isYou&&player)cls+=' mine';
      if(isActive)cls+=' onclock';
      boardHTML+=`<div class="${cls}">
        <div class="cell-rd">${r+1}.${String(t+1).padStart(2,"0")}</div>
        ${player?`<div class="cell-name">${player.name}</div>
        <span class="cell-badge ${player.pos}">${player.pos}</span>
        <div class="cell-adp">ADP ${player.adp.toFixed(1)}</div>`:''}
      </div>`;
    }
  }

  // Stack tracker
  const stacks_data=buildStackTracker(myR);
  let stackHTML='<div class="stack-tracker"><div class="st-title">🔗 Stack Tracker</div>';
  if(!stacks_data||!stacks_data.length){
    stackHTML+='<div class="st-empty">Draft a QB to build your stack</div>';
  }else{
    stacks_data.forEach(({qb,onRoster,available})=>{
      stackHTML+=`<div class="stack-item">
        <div class="si-qb"><span class="si-qb-name">${qb.name.split(' ').pop()}</span><span class="si-qb-team">${qb.team}</span></div>
        <div class="si-partners">
          ${onRoster.map(p=>`<span class="si-partner drafted" title="${p.name}">${p.name.split(' ').pop()} <span style="opacity:.6;font-size:8px">${p.pos}</span></span>`).join('')}
          ${available.map(p=>`<span class="si-partner avail" title="ADP ${p.adp.toFixed(1)}">${p.name.split(' ').pop()} <span style="opacity:.6;font-size:8px">${p.pos} ${p.adp.toFixed(0)}</span></span>`).join('')}
        </div>
        ${!onRoster.length?'<div class="si-avail-label">No stack partners yet</div>':''}
      </div>`;
    });
  }
  stackHTML+='</div>';

  // Roster
  const allSlots=buildSlots(S.contest),startSlots=allSlots.filter(s=>s.s),benchSlots=allSlots.filter(s=>!s.s);
  const used=new Set();
  function assignSlots(slots){
    return slots.map(slot=>{
      let assigned=null;
      for(let i=0;i<myR.length;i++){if(!used.has(i)&&slot.p.includes(myR[i].pos)){assigned=myR[i];used.add(i);break;}}
      return{slot,player:assigned};
    });
  }
  const startAssigned=assignSlots(startSlots);
  const benchAssigned=assignSlots(benchSlots);
  const rosterHTML=`
    <div class="rdivider">Starting Lineup</div>
    ${startAssigned.map(({slot,player})=>`<div class="rslot starter">
      <span class="rslot-pos ${player?player.pos:''}">${slot.l}</span>
      ${player?`<div style="flex:1;min-width:0"><div class="rslot-name">${player.name}</div><div class="rslot-team">${player.team}</div></div>`
              :`<div class="rslot-name" style="color:var(--text3);font-style:italic">—</div>`}
    </div>`).join('')}
    <div class="rdivider" style="margin-top:4px">Bench</div>
    ${benchAssigned.map(({slot,player})=>`<div class="rslot">
      <span class="rslot-pos" style="color:var(--text3)">${slot.l}</span>
      ${player?`<div style="flex:1;min-width:0"><div class="rslot-name">${player.name} <span class="pbadge ${player.pos}" style="font-size:7px;vertical-align:middle">${player.pos}</span></div><div class="rslot-team">${player.team}</div></div>`
              :`<div class="rslot-name" style="color:var(--text3);font-style:italic">—</div>`}
    </div>`).join('')}`;

  const projTotal=Math.round(myR.reduce((s,p)=>s+p.proj,0));
  const buildPills=['QB','RB','WR','TE'].map(pos=>`<span class="build-pill" style="background:${pos==='QB'?'var(--qbbg)':pos==='RB'?'var(--rbbg)':pos==='WR'?'var(--wrbg)':'var(--tebg)'};color:var(--${pos.toLowerCase()})">${myPc[pos]}${pos}</span>`).join('');

  return`<div class="main">
    <div class="left">
      ${status}${tgHtml}${scarHtml}
      <div class="po-row">${poHTML}</div>
      <div class="ctrl"><input type="text" placeholder="Search name or team..." id="srch" value="${S.search}" oninput="S.search=this.value;reList()"></div>
      <div class="ftabs">${['ALL','QB','RB','WR','TE'].map(f=>`<button class="ftab ${f}${S.filter===f?' on':''}" onclick="S.filter='${f}';reList()">${f}</button>`).join('')}</div>
      <div class="plist" id="plist">${pListHTML()}</div>
    </div>
    <div class="center">
      <div class="center-hdr">
        <span style="font-size:12px;font-weight:600;font-family:var(--ffh)">Draft Board</span>
        <span style="font-size:10px;color:var(--gold)">${CONTESTS[S.contest].scoringNote}</span><span style="font-size:10px;color:var(--text2)">· Click column to view roster</span>
        <span style="font-size:10px;color:var(--text2)">${S.done?'Complete ✅':'Pick '+(S.pickNum+1)+'/'+TOTAL}</span>
      </div>
      ${S.aiRunning?`<div class="ai-bar">🤖 AI picking<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>`:''}
      <div class="board-wrap"><div class="board">${boardHTML}</div></div>
    </div>
    <div class="right">
      <div class="rp-hdr"><span class="rp-hdr-t">My Roster</span><span style="font-size:10px;color:var(--text2)">${myR.length}/20</span></div>
      ${stackHTML}
      <div class="rp-body">${rosterHTML}</div>
      <div class="sgrid">
        <div class="sc"><div class="sc-l">Drafted</div><div class="sc-v" style="color:var(--rb)">${myR.length}</div></div>
        <div class="sc"><div class="sc-l">Remaining</div><div class="sc-v">${20-myR.length}</div></div>
        <div class="sc" style="grid-column:1/-1"><div class="sc-l">Build</div><div class="build-pills">${buildPills}</div></div>
        <div class="sc"><div class="sc-l">Proj Pts</div><div class="sc-v" style="font-size:13px">${projTotal}</div></div>
        <div class="sc"><div class="sc-l">Top Stack</div><div class="sc-v" style="font-size:11px;color:var(--stk)">${topStk?topStk[0]+' ×'+topStk[1]:'—'}</div></div>
      </div>
      <div class="archetype-banner">
        <div class="arch-label">Draft Archetype</div>
        <div class="arch-badge"><span class="arch-icon">${arch.icon}</span><div><div class="arch-name">${arch.name}</div><div class="arch-sub">${arch.desc.split('.')[0]}</div></div></div>
      </div>
    </div>
  </div>`;
}

// ── HISTORY PAGE ──────────────────────────────────────────────────────────
function renderHistory(){
  const h=loadHistory();
  if(!h.length)return`<div class="history-page"><h2>Draft History</h2><p class="page-sub">Run a mock draft to start tracking.</p>
    <div class="empty-hist"><div class="ei">📋</div><p>No drafts yet. Your history, archetype trends, and exposure data will appear here.</p></div></div>`;

  const totalDrafts=h.length;
  const allPicks=h.flatMap(d=>d.picks);
  const avgProj=Math.round(h.reduce((s,d)=>s+d.projPts,0)/totalDrafts);

  // Position distribution
  const posFreq={QB:0,RB:0,WR:0,TE:0};
  allPicks.forEach(p=>posFreq[p.pos]=(posFreq[p.pos]||0)+1);
  const total=allPicks.length||1;

  // Early round (1-6) tendencies
  const earlyPicks=allPicks.filter(p=>p.round<=6);
  const earlyFreq={QB:0,RB:0,WR:0,TE:0};
  earlyPicks.forEach(p=>earlyFreq[p.pos]=(earlyFreq[p.pos]||0)+1);
  const earlyTotal=earlyPicks.length||1;

  // Archetype distribution
  const archFreq={};
  h.forEach(d=>{if(d.archetype){const k=d.archetype.id;archFreq[k]=(archFreq[k]||{count:0,icon:d.archetype.icon,name:d.archetype.name,count:0});archFreq[k].count++;}});
  const archItems=Object.values(archFreq).sort((a,b)=>b.count-a.count);

  // Exposure — most drafted players
  const playerFreq={};
  allPicks.forEach(p=>{
    if(!playerFreq[p.id])playerFreq[p.id]={name:p.name,pos:p.pos,adp:p.adp,count:0};
    playerFreq[p.id].count++;
  });
  const topExposure=Object.values(playerFreq).sort((a,b)=>b.count-a.count).slice(0,10);

  const posColors={QB:'var(--qb)',RB:'var(--rb)',WR:'var(--wr)',TE:'var(--te)'};

  const histRows=h.slice(0,20).map((d,i)=>{
    const arch=d.archetype;
    return`<div class="dl-row">
      <span style="color:var(--text3)">#${i+1}</span>
      <span class="bold">${d.date}</span>
      <span>Slot ${d.slot}</span>
      <span>${d.build}</span>
      <span style="color:var(--stk)">${arch?arch.icon+' '+arch.name.split(' ')[0]:'—'}</span>
      <span style="color:var(--wr)">${d.topStack}</span>
    </div>`;
  }).join('');

  const expRows=topExposure.map(p=>`<div class="exp-bar-row">
    <span class="exp-name">${p.name} <span class="pbadge ${p.pos}" style="font-size:8px;vertical-align:middle">${p.pos}</span></span>
    <div class="exp-bar-track"><div class="exp-bar-fill" style="width:${Math.round(p.count/totalDrafts*100)}%"></div></div>
    <span class="exp-pct">${Math.round(p.count/totalDrafts*100)}%</span>
  </div>`).join('');

  return`<div class="history-page">
    <h2>Draft History & Analytics</h2>
    <p class="page-sub">Tracking your tendencies across ${totalDrafts} mock${totalDrafts!==1?'s':''}.</p>
    <div class="hstat-row">
      <div class="hstat"><div class="hstat-l">Drafts</div><div class="hstat-v">${totalDrafts}</div><div class="hstat-sub">Total mocks run</div></div>
      <div class="hstat"><div class="hstat-l">Avg Proj Pts</div><div class="hstat-v">${avgProj}</div><div class="hstat-sub">Per draft</div></div>
      <div class="hstat"><div class="hstat-l">Top Archetype</div><div class="hstat-v" style="font-size:14px">${archItems[0]?archItems[0].icon+' '+archItems[0].name.split(' ').slice(0,2).join(' '):'—'}</div><div class="hstat-sub">Most common style</div></div>
      <div class="hstat"><div class="hstat-l">Players Tracked</div><div class="hstat-v">${Object.keys(playerFreq).length}</div><div class="hstat-sub">Unique players drafted</div></div>
    </div>
    ${archItems.length?`<div class="hist-section" style="margin-bottom:10px">Archetype History</div>
    <div class="arch-dist" style="margin-bottom:20px">
      ${archItems.map(a=>`<div class="arch-dist-item"><span class="arch-dist-icon">${a.icon}</span><div><div class="arch-dist-name">${a.name}</div><div class="arch-dist-ct">${a.count} draft${a.count!==1?'s':''} · ${Math.round(a.count/totalDrafts*100)}%</div></div></div>`).join('')}
    </div>`:''}
    <div class="trend-grid">
      <div class="trend-card"><h4>Overall Position Mix</h4>
        ${['QB','RB','WR','TE'].map(pos=>`<div class="tbar-row">
          <span class="tbar-lbl" style="color:${posColors[pos]}">${pos}</span>
          <div class="tbar-track"><div class="tbar-fill" style="width:${Math.round(posFreq[pos]/total*100)}%;background:${posColors[pos]}"></div></div>
          <span class="tbar-pct">${Math.round(posFreq[pos]/total*100)}%</span>
        </div>`).join('')}
      </div>
      <div class="trend-card"><h4>Early Rounds (1–6) Tendencies</h4>
        ${['QB','RB','WR','TE'].map(pos=>`<div class="tbar-row">
          <span class="tbar-lbl" style="color:${posColors[pos]}">${pos}</span>
          <div class="tbar-track"><div class="tbar-fill" style="width:${Math.round(earlyFreq[pos]/earlyTotal*100)}%;background:${posColors[pos]}"></div></div>
          <span class="tbar-pct">${Math.round(earlyFreq[pos]/earlyTotal*100)}%</span>
        </div>`).join('')}
      </div>
    </div>
    <div class="hist-section">Player Exposure</div>
    <div style="background:var(--ink2);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:20px">${expRows||'<div style="color:var(--text3);font-size:11px">No data yet.</div>'}</div>
    <div class="hist-section">Draft Log</div>
    <div class="draft-log">
      <div class="dl-hdr"><span>#</span><span>Date</span><span>Slot</span><span>Build</span><span>Archetype</span><span>Top Stack</span></div>
      ${histRows}
    </div>
    <div style="margin-top:14px;display:flex;gap:8px">
      <button class="btn btn-gold" onclick="navTo('draft')">⚑ Start New Draft</button>
      <button class="btn btn-danger" onclick="clearHistory()">🗑 Clear History</button>
    </div>
  </div>`;
}
function clearHistory(){if(confirm('Clear all draft history?')){localStorage.removeItem('mb_hist');navTo('history');}}

function startDraft(slot){
  const shuffled=[...AI_NAMES].sort(()=>Math.random()-.5);
  const names=[];let ai=0;
  for(let i=0;i<TEAMS;i++)names.push(i===(slot-1)?'YOU':shuffled[ai++]||'Team '+(i+1));
  S={started:true,userSlot:slot,pickNum:0,picks:[],drafted:new Set(),
    rosters:Array.from({length:TEAMS},()=>[]),filter:'ALL',search:'',
    aiRunning:false,done:false,showDrafted:false,teamNames:names,page:'draft',
    contest:S.contest};
  document.getElementById('tog-btn').textContent='👁 Drafted';
  document.getElementById('tog-btn').classList.remove('on');
  navTo('draft');
  if(!isMyTurn())setTimeout(runAI,300);
}
function resetDraft(){const c=S.contest;S={started:false,pickNum:0,picks:[],drafted:new Set(),rosters:Array.from({length:TEAMS},()=>[]),filter:'ALL',search:'',aiRunning:false,done:false,showDrafted:false,teamNames:[],page:'setup',contest:c};render();}
render();
</script>
</body>
</html>
