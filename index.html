<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MockBall — Best Ball Mock Draft Simulator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Core palette */
  --ink:#0a0e17;--ink2:#111827;--ink3:#1c2333;--ink4:#252f42;
  --surface:#1a2035;--surface2:#212840;--surface3:#2a3352;
  --line:#2e3a52;--line2:#3d4f6e;
  --text:#e8edf5;--text2:#8b9ab8;--text3:#4a5a7a;
  --accent:#f0b429;--accent2:#e8a017;
  /* Position colors */
  --qb:#c084fc;--qbbg:rgba(192,132,252,.12);--qbbd:rgba(192,132,252,.4);
  --rb:#34d399;--rbbg:rgba(52,211,153,.12);--rbbd:rgba(52,211,153,.4);
  --wr:#fb923c;--wrbg:rgba(251,146,60,.12);--wrbd:rgba(251,146,60,.4);
  --te:#60a5fa;--tebg:rgba(96,165,250,.12);--tebd:rgba(96,165,250,.4);
  /* Grade colors */
  --ga:#34d399;--gb:#60a5fa;--gc:#fb923c;--gd:#f87171;
  /* Font */
  --ff:'Inter',system-ui,sans-serif;--ffh:'Space Grotesk',system-ui,sans-serif;
}
html,body{height:100%;background:var(--ink);color:var(--text);font-family:var(--ff);font-size:13px;overflow:hidden;-webkit-font-smoothing:antialiased}

/* ═══ LAYOUT ═══════════════════════════════════════════════ */
.app{display:grid;grid-template-rows:56px 1fr;height:100vh}
.main{display:grid;grid-template-columns:306px 1fr 224px;height:100%;overflow:hidden}

/* ═══ HEADER ════════════════════════════════════════════════ */
.hdr{
  background:var(--ink2);
  border-bottom:1px solid var(--line);
  padding:0 20px;
  display:flex;align-items:center;gap:14px;
  box-shadow:0 1px 12px rgba(0,0,0,.4);
  position:relative;z-index:20;
}
.logo-mark{
  display:flex;align-items:center;gap:10px;text-decoration:none;
}
.logo-icon{
  width:34px;height:34px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;flex-shrink:0;
  box-shadow:0 2px 8px rgba(240,180,41,.3);
}
.logo-text{font-family:var(--ffh);font-size:17px;font-weight:700;color:var(--text);letter-spacing:-.4px}
.logo-text span{color:var(--accent)}
.hdivider{width:1px;height:22px;background:var(--line);flex-shrink:0}
.hbadge{
  background:var(--ink3);border:1px solid var(--line);border-radius:20px;
  padding:3px 10px;font-size:10px;font-weight:500;color:var(--text2);white-space:nowrap;
  letter-spacing:.2px;
}
.hbadge.hot{background:rgba(240,180,41,.1);border-color:rgba(240,180,41,.35);color:var(--accent)}
.hnav{display:flex;gap:2px;margin-left:4px}
.hnav-btn{
  padding:5px 13px;border-radius:6px;border:none;background:transparent;
  color:var(--text2);cursor:pointer;font-size:11px;font-weight:500;
  font-family:var(--ff);transition:.15s;letter-spacing:.1px;
}
.hnav-btn:hover{background:var(--ink3);color:var(--text)}
.hnav-btn.active{background:var(--surface);color:var(--text);font-weight:600}
.hright{margin-left:auto;display:flex;gap:8px;align-items:center}
.hpick{font-size:11px;color:var(--text2);white-space:nowrap;font-variant-numeric:tabular-nums}

/* ═══ BUTTONS ════════════════════════════════════════════════ */
.btn{
  padding:5px 13px;border-radius:7px;
  border:1px solid var(--line2);background:var(--surface);
  color:var(--text);cursor:pointer;font-size:11px;font-weight:500;
  white-space:nowrap;user-select:none;transition:.12s;
  font-family:var(--ff);letter-spacing:.1px;
}
.btn:hover{background:var(--surface2);border-color:var(--line2)}
.btn:active{transform:scale(.98)}
.btn-gold{background:linear-gradient(135deg,var(--accent2),var(--accent));border-color:transparent;color:#0a0e17;font-weight:600}
.btn-gold:hover{filter:brightness(1.08)}
.btn-ghost{background:transparent;border-color:var(--line);color:var(--text2)}
.btn-ghost:hover{border-color:var(--line2);color:var(--text);background:var(--ink3)}
.btn-danger{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.35);color:#f87171}
.btn-danger:hover{background:rgba(248,113,113,.18)}
.btn-tog{font-size:10px;padding:4px 10px;border-radius:6px}
.btn-tog.on{background:rgba(52,211,153,.1);border-color:var(--rbbd);color:var(--rb)}

/* ═══ SETUP / LANDING PAGE ═══════════════════════════════════ */
.setup{
  display:flex;align-items:center;justify-content:center;
  height:100%;overflow-y:auto;padding:24px;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(240,180,41,.06) 0%,transparent 60%),var(--ink);
}
.setup-inner{max-width:860px;width:100%}
.setup-hero{text-align:center;margin-bottom:36px}
.setup-hero h1{
  font-family:var(--ffh);font-size:34px;font-weight:700;
  letter-spacing:-1px;line-height:1.1;margin-bottom:10px;
  background:linear-gradient(135deg,var(--text) 40%,var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.setup-hero p{color:var(--text2);font-size:14px;line-height:1.7;max-width:480px;margin:0 auto}
.setup-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:30px}
.setup-card{
  background:var(--ink2);border:1px solid var(--line);border-radius:12px;
  padding:14px 16px;
}
.setup-card-icon{font-size:22px;margin-bottom:8px}
.setup-card-label{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:3px;font-weight:600}
.setup-card-val{font-size:14px;font-weight:700;color:var(--text)}
.lineup-section{margin-bottom:28px}
.section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:10px}
.lineup-pills{display:flex;flex-wrap:wrap;gap:6px}
.lp{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid;letter-spacing:.2px}
.lpQB{color:var(--qb);background:var(--qbbg);border-color:var(--qbbd)}
.lpRB{color:var(--rb);background:var(--rbbg);border-color:var(--rbbd)}
.lpWR{color:var(--wr);background:var(--wrbg);border-color:var(--wrbd)}
.lpTE{color:var(--te);background:var(--tebg);border-color:var(--tebd)}
.lpFL{color:var(--text2);background:var(--ink3);border-color:var(--line)}
.slot-section{margin-bottom:28px}
.slot-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:6px;margin-bottom:10px}
.slot-btn{
  padding:12px 4px;border-radius:10px;
  border:1px solid var(--line);background:var(--ink2);
  color:var(--text);cursor:pointer;font-size:16px;font-weight:700;
  transition:.15s;text-align:center;font-family:var(--ffh);
}
.slot-btn:hover{background:rgba(240,180,41,.12);border-color:rgba(240,180,41,.5);color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 12px rgba(240,180,41,.15)}
.slot-btn:active{transform:translateY(0)}
.tip{font-size:11px;color:var(--text3);line-height:1.6;text-align:center}
.tip b{color:var(--text2);font-weight:500}

/* ═══ HISTORY / ANALYTICS PAGE ══════════════════════════════ */
.history-page{height:100%;overflow-y:auto;padding:24px;background:var(--ink)}
.history-page h2{font-family:var(--ffh);font-size:20px;font-weight:700;margin-bottom:4px}
.history-page .page-sub{color:var(--text2);font-size:12px;margin-bottom:24px}
.stat-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:24px}
.stat-card{
  background:var(--ink2);border:1px solid var(--line);border-radius:12px;padding:14px 16px;
}
.stat-card-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:4px;font-weight:600}
.stat-card-val{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
.stat-card-sub{font-size:10px;color:var(--text2);margin-top:2px}
.history-section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:12px}
.trend-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.trend-card{background:var(--ink2);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
.trend-card h4{font-size:12px;font-weight:600;margin-bottom:12px}
.trend-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.trend-bar-label{font-size:11px;color:var(--text2);width:32px;flex-shrink:0}
.trend-bar-track{flex:1;height:6px;background:var(--ink4);border-radius:3px;overflow:hidden}
.trend-bar-fill{height:100%;border-radius:3px;transition:.4s}
.trend-bar-pct{font-size:10px;color:var(--text2);width:28px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}
.draft-history-table{background:var(--ink2);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:24px}
.dht-hdr{display:grid;grid-template-columns:48px 1fr 80px 80px 80px 100px;gap:0;background:var(--ink3);border-bottom:1px solid var(--line)}
.dht-hdr span,.dht-row span{padding:9px 12px;font-size:10px}
.dht-hdr span{font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3)}
.dht-row{display:grid;grid-template-columns:48px 1fr 80px 80px 80px 100px;border-bottom:1px solid var(--line);transition:.1s}
.dht-row:last-child{border-bottom:none}
.dht-row:hover{background:var(--ink3)}
.dht-row span{font-size:11px;color:var(--text2);display:flex;align-items:center}
.dht-row span:first-child{color:var(--text3);font-size:10px}
.dht-row span.bold{color:var(--text);font-weight:500}
.player-prefs{background:var(--ink2);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:24px}
.pp-hdr{background:var(--ink3);border-bottom:1px solid var(--line);display:grid;grid-template-columns:1fr 60px 60px 80px 90px}
.pp-hdr span,.pp-row span{padding:9px 12px;font-size:10px}
.pp-hdr span{font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3)}
.pp-row{display:grid;grid-template-columns:1fr 60px 60px 80px 90px;border-bottom:1px solid var(--line);transition:.1s}
.pp-row:last-child{border-bottom:none}
.pp-row:hover{background:var(--ink3)}
.pp-row span{font-size:11px;color:var(--text2);display:flex;align-items:center}
.pp-row .pp-name{font-weight:500;color:var(--text)}
.empty-history{text-align:center;padding:48px 24px;color:var(--text3)}
.empty-history .ei{font-size:36px;margin-bottom:12px}
.empty-history p{font-size:13px;line-height:1.6}
.round-tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;font-variant-numeric:tabular-nums}
.grade-pill{padding:2px 7px;border-radius:10px;font-size:9px;font-weight:700;letter-spacing:.2px}
.gA{background:rgba(52,211,153,.15);color:var(--ga)}.gB{background:rgba(96,165,250,.15);color:var(--gb)}
.gC{background:rgba(251,146,60,.15);color:var(--gc)}.gD{background:rgba(248,113,113,.15);color:var(--gd)}

/* ═══ DRAFT ACTIVE — LEFT PANEL ══════════════════════════════ */
.left{background:var(--ink2);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
.pick-status{padding:12px 14px;border-bottom:1px solid var(--line);flex-shrink:0}
.ps-eyebrow{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:3px;font-weight:600}
.ps-main{font-size:15px;font-weight:700;font-family:var(--ffh)}
.ps-sub{font-size:10px;color:var(--text2);margin-top:2px}
.ps-turn{background:rgba(52,211,153,.05);border-color:rgba(52,211,153,.2)}
.po-row{display:flex;gap:2px;padding:6px 14px;border-bottom:1px solid var(--line);overflow-x:auto;flex-shrink:0}
.po{
  min-width:22px;height:20px;border-radius:4px;
  background:var(--ink3);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:700;flex-shrink:0;color:var(--text3);
}
.po-you{background:rgba(52,211,153,.15);border-color:var(--rbbd);color:#34d399}
.po-cur{background:rgba(96,165,250,.15);border-color:var(--tebd);color:#60a5fa}
.ctrl-row{display:flex;align-items:center;gap:6px;padding:6px 14px;border-bottom:1px solid var(--line);flex-shrink:0}
.ctrl-row input{
  flex:1;background:var(--ink3);border:1px solid var(--line);border-radius:7px;
  padding:5px 10px;color:var(--text);font-size:11px;outline:none;font-family:var(--ff);
}
.ctrl-row input:focus{border-color:var(--tebd)}
.ctrl-row input::placeholder{color:var(--text3)}
.ftabs{display:flex;gap:3px;padding:5px 14px;border-bottom:1px solid var(--line);flex-shrink:0}
.ftab{
  padding:3px 9px;border-radius:20px;border:1px solid transparent;
  background:transparent;color:var(--text3);cursor:pointer;
  font-size:10px;font-weight:500;font-family:var(--ff);transition:.1s;
}
.ftab:hover{color:var(--text2);background:var(--ink3)}
.ftab.on{border-color:currentColor;background:var(--ink3)}
.ftab.ALL.on{color:var(--text);border-color:var(--line2)}
.ftab.QB.on{color:var(--qb);border-color:var(--qbbd);background:var(--qbbg)}
.ftab.RB.on{color:var(--rb);border-color:var(--rbbd);background:var(--rbbg)}
.ftab.WR.on{color:var(--wr);border-color:var(--wrbd);background:var(--wrbg)}
.ftab.TE.on{color:var(--te);border-color:var(--tebd);background:var(--tebg)}
.plist{overflow-y:auto;flex:1}
.prow{
  display:flex;align-items:center;gap:6px;padding:6px 14px;
  border-bottom:1px solid var(--line);cursor:pointer;transition:background .08s;user-select:none;
}
.prow:hover{background:var(--ink3)}
.prow.gone{display:none}
.prow.gone.vis{display:flex;opacity:.2;pointer-events:none}
.padp{font-size:10px;color:var(--text3);width:28px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}
.pbadge{width:26px;text-align:center;flex-shrink:0;border-radius:4px;padding:1px 0;font-size:9px;font-weight:700}
.QB{color:var(--qb);background:var(--qbbg)}.RB{color:var(--rb);background:var(--rbbg)}.WR{color:var(--wr);background:var(--wrbg)}.TE{color:var(--te);background:var(--tebg)}
.pinfo{flex:1;min-width:0}
.pname{font-weight:500;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.pteam{font-size:10px;color:var(--text3)}
.grade{padding:1px 5px;border-radius:8px;font-size:9px;font-weight:700;flex-shrink:0}
.gA{background:rgba(52,211,153,.15);color:var(--ga)}.gB{background:rgba(96,165,250,.15);color:var(--gb)}.gC{background:rgba(251,146,60,.15);color:var(--gc)}.gD{background:rgba(248,113,113,.15);color:var(--gd)}
.pproj{font-size:10px;color:var(--text3);width:28px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}
.stk{font-size:9px;color:var(--wr);background:rgba(251,146,60,.12);padding:1px 4px;border-radius:3px;flex-shrink:0;font-weight:600}

/* ═══ CENTER BOARD ═══════════════════════════════════════════ */
.center{background:var(--ink);display:flex;flex-direction:column;overflow:hidden}
.center-hdr{
  padding:9px 14px;border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;background:var(--ink2);
}
.ai-bar{
  display:flex;align-items:center;gap:8px;padding:5px 14px;
  background:rgba(96,165,250,.06);border-bottom:1px solid var(--line);
  font-size:10px;color:var(--te);flex-shrink:0;
}
.dots span{animation:blink 1.2s infinite;opacity:0}
.dots span:nth-child(2){animation-delay:.25s}.dots span:nth-child(3){animation-delay:.5s}
@keyframes blink{0%,80%,100%{opacity:0}35%{opacity:1}}
.board-wrap{overflow:auto;flex:1}
.board{display:grid;grid-template-columns:repeat(12,minmax(78px,1fr));min-width:936px}
.col-hdr{
  position:sticky;top:0;z-index:10;
  padding:8px 6px 7px;text-align:center;
  font-size:9px;font-weight:600;color:var(--text3);
  background:var(--ink2);border-bottom:2px solid var(--line);border-right:1px solid var(--line);
  text-transform:uppercase;letter-spacing:.5px;line-height:1.3;
}
.col-hdr.you{background:rgba(52,211,153,.07);border-bottom-color:var(--rbbd);color:#34d399}
.col-hdr .team-name{font-size:8px;color:var(--text3);margin-top:1px;font-style:italic;text-transform:none;letter-spacing:0;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.col-hdr.you .team-name{color:rgba(52,211,153,.6)}
.bcell{
  border-bottom:1px solid var(--line);border-right:1px solid var(--line);
  padding:5px 6px;min-height:58px;background:var(--ink2);position:relative;
  transition:.1s;
}
.bcell.empty{background:var(--ink);opacity:.3}
.bcell.onclock{animation:cpulse 1.7s ease-in-out infinite}
@keyframes cpulse{
  0%,100%{background:rgba(96,165,250,.08);box-shadow:inset 0 0 0 1px rgba(96,165,250,.4)}
  50%{background:rgba(52,211,153,.06);box-shadow:inset 0 0 0 1px rgba(52,211,153,.4)}
}
.bcell.mine{background:rgba(52,211,153,.05);border-right-color:rgba(52,211,153,.25)}
.cell-rd{font-size:8px;color:var(--text3);margin-bottom:2px;font-variant-numeric:tabular-nums}
.cell-name{font-size:10px;font-weight:600;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.cell-badge{display:inline-block;padding:1px 4px;border-radius:3px;font-size:8px;font-weight:700;margin-top:2px}
.cell-adp{font-size:8px;color:var(--text3);margin-top:1px;font-variant-numeric:tabular-nums}

/* ═══ RIGHT ROSTER ═══════════════════════════════════════════ */
.right{background:var(--ink2);border-left:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
.rp-hdr{padding:9px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.rp-hdr-title{font-size:12px;font-weight:700;font-family:var(--ffh)}
.rp-body{overflow-y:auto;flex:1;padding:5px 8px}
.rslot{
  display:flex;align-items:center;gap:5px;padding:3px 6px;
  border-radius:6px;margin-bottom:2px;border:1px solid var(--line);
  background:var(--ink3);min-height:28px;transition:.1s;
}
.rslot.bench{background:var(--ink);border-color:var(--line);}
.rslot.starter{border-left:2px solid var(--accent);padding-left:5px;}
.rslot-divider{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;
  color:var(--text3);padding:6px 6px 3px;margin-top:2px;}
.rslot-pos{font-size:9px;font-weight:700;width:28px;text-align:center;padding:2px 0;border-radius:4px;flex-shrink:0}
.rslot-name{font-size:10px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.rslot-team{font-size:9px;color:var(--text3)}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:8px;border-top:1px solid var(--line);flex-shrink:0}
.sc{background:var(--ink3);border:1px solid var(--line);border-radius:8px;padding:7px 9px}
.sc-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;font-weight:600}
.sc-v{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
.build-pills{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px}
.build-pill{font-size:9px;font-weight:600;padding:1px 5px;border-radius:4px}

/* ═══ POST-DRAFT ANALYSIS PANEL ══════════════════════════════ */
.analysis-panel{
  position:absolute;inset:0;z-index:50;
  background:rgba(10,14,23,.85);
  display:flex;align-items:center;justify-content:center;
  padding:24px;display:none;
}
.analysis-card{
  background:var(--ink2);border:1px solid var(--line);border-radius:16px;
  padding:28px;max-width:680px;width:100%;max-height:85vh;overflow-y:auto;
  position:relative;
}
.analysis-card h3{font-family:var(--ffh);font-size:18px;font-weight:700;margin-bottom:4px}
.analysis-close{position:absolute;top:16px;right:16px}
.grade-ring{
  display:inline-flex;align-items:center;justify-content:center;
  width:60px;height:60px;border-radius:50%;
  font-family:var(--ffh);font-size:24px;font-weight:700;
  border:3px solid;margin-bottom:12px;
}
.analysis-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.ag-card{background:var(--ink3);border-radius:10px;padding:12px 14px;border:1px solid var(--line)}
.ag-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-bottom:3px;font-weight:600}
.ag-val{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums}
.ag-sub{font-size:10px;color:var(--text2);margin-top:2px}
.pick-log{background:var(--ink3);border-radius:10px;overflow:hidden;border:1px solid var(--line)}
.pick-log-hdr{display:grid;grid-template-columns:36px 50px 1fr 70px 70px;background:var(--ink4);border-bottom:1px solid var(--line)}
.pick-log-hdr span,.pick-log-row span{padding:7px 8px;font-size:9px}
.pick-log-hdr span{text-transform:uppercase;letter-spacing:.5px;font-weight:600;color:var(--text3)}
.pick-log-row{display:grid;grid-template-columns:36px 50px 1fr 70px 70px;border-bottom:1px solid var(--line)}
.pick-log-row:last-child{border-bottom:none}
.pick-log-row span{font-size:10px;color:var(--text2);display:flex;align-items:center}
.pick-log-row span.bold{color:var(--text);font-weight:500}

/* ═══ TOAST ══════════════════════════════════════════════════ */
.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--ink2);border:1px solid var(--line2);border-radius:10px;
  padding:8px 16px;font-size:11px;opacity:0;
  transition:opacity .2s,transform .2s;pointer-events:none;z-index:999;
  white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.5);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

::-webkit-scrollbar{width:5px;height:5px}

::-webkit-scrollbar-thumb:hover{background:var(--line2)}
</style>

// ── STATE ─────────────────────────────────────────────────────
let S={
  started:false,userSlot:1,pickNum:0,picks:[],
  drafted:new Set(),rosters:Array.from({length:TEAMS},()=>[]),
  filter:'ALL',search:'',aiRunning:false,done:false,showDrafted:false,
  teamNames:[],page:'setup'
};

// Draft history stored in localStorage
function loadHistory(){
  try{return JSON.parse(localStorage.getItem('mb_history')||'[]');}catch(e){return[];}
}
function saveHistory(h){try{localStorage.setItem('mb_history',JSON.stringify(h));}catch(e){}}
function addToHistory(entry){
  const h=loadHistory();
  h.unshift(entry);
  if(h.length>50)h.pop();
  saveHistory(h);
}

// ── HELPERS ───────────────────────────────────────────────────
function isMyTurn(){return !S.done&&teamAt(S.pickNum)===(S.userSlot-1);}
function avail(){return P.filter(p=>!S.drafted.has(p.id));}
function pc(r){const c={QB:0,RB:0,WR:0,TE:0};r.forEach(p=>c[p.pos]++);return c;}
function stacks(r){const t={};r.forEach(p=>{if(p.team&&p.team!=='FA')t[p.team]=(t[p.team]||0)+1;});return t;}
function qbTeams(r){const s=new Set();r.forEach(p=>{if(p.pos==='QB'&&p.team&&p.team!=='FA')s.add(p.team);});return s;}
function grade(p,n){const d=(n+1)-p.adp;return d>=8?'A':d>=2?'B':d>=-4?'C':'D';}
function avgGrade(picks){
  if(!picks.length)return'—';
  const gs=picks.map(pk=>grade(pk.player,pk.n));
  const score=gs.reduce((s,g)=>s+({A:4,B:3,C:2,D:1}[g]||2),0)/gs.length;
  if(score>=3.5)return'A';if(score>=2.5)return'B';if(score>=1.5)return'C';return'D';
}
function toast(msg){
  const e=document.getElementById('toast');e.textContent=msg;e.classList.add('show');
  setTimeout(()=>e.classList.remove('show'),2500);
}
function navTo(page){
  S.page=page;
  document.querySelectorAll('.hnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+page).classList.add('active');
  document.getElementById('view').innerHTML=(page==='history')?renderHistory():renderMain();
  updateHeader();
}

// ── AI PICK ───────────────────────────────────────────────────
function aiPick(ti){
  const av=avail();if(!av.length)return null;
  const cur=S.pickNum+1,lo=cur-8,hi=cur+22;
  const roster=S.rosters[ti],counts=pc(roster),qbs=roster.filter(r=>r.pos==='QB');
  let pool=av.filter(p=>p.adp>=lo&&p.adp<=hi&&counts[p.pos]<CAPS[p.pos]);
  if(!pool.length)pool=av.filter(p=>counts[p.pos]<CAPS[p.pos]).slice(0,20);
  if(!pool.length)pool=av.slice(0,5);
  const round=roundOf(S.pickNum);
  function score(p){
    let s=-(p.adp-cur)*1.3;
    if(round<=5&&(p.pos==='RB'||p.pos==='WR'))s+=4;
    if(p.pos==='QB'&&counts.QB===0&&round>=6&&round<=11)s+=8;
    if(p.pos==='TE'&&counts.TE===0&&round>=5&&round<=11)s+=6;
    qbs.forEach(q=>{if(q.team===p.team&&(p.pos==='WR'||p.pos==='TE'))s+=5;});
    s+=(Math.random()*4-2);
    return s;
  }
  pool.sort((a,b)=>score(b)-score(a));
  return pool[0];
}

// ── EXECUTION ─────────────────────────────────────────────────
function exec(player,ti){
  S.drafted.add(player.id);S.rosters[ti].push(player);
  S.picks.push({n:S.pickNum,ti,player});
  S.pickNum++;if(S.pickNum>=TOTAL)S.done=true;
}
function userDraft(id){
  if(S.done||S.aiRunning||!isMyTurn())return;
  const p=P.find(x=>x.id===id);if(!p||S.drafted.has(p.id))return;
  const g=grade(p,S.pickNum);exec(p,S.userSlot-1);
  toast('✅ '+p.name+' · '+p.pr+' · Grade: '+g);
  setTimeout(runAI,150);
}
function doAuto(){
  if(S.done||S.aiRunning||!isMyTurn())return;
  const p=aiPick(S.userSlot-1);if(!p)return;
  exec(p,S.userSlot-1);toast('⚡ Auto: '+p.name+' · '+p.pr);
  setTimeout(runAI,150);
}
function runAI(){
  if(S.done||isMyTurn()){
    if(S.done) finalizeDraft();
    else render();
    return;
  }
  S.aiRunning=true;updateHeader();
  const step=()=>{
    if(S.done||isMyTurn()){
      S.aiRunning=false;
      if(S.done)finalizeDraft();else render();
      return;
    }
    const ti=teamAt(S.pickNum),pk=aiPick(ti);if(pk)exec(pk,ti);
    setTimeout(step,75);
  };
  step();
}

function finalizeDraft(){
  // Build history entry
  const myR=S.rosters[S.userSlot-1];
  const myPicks=S.picks.filter(pk=>pk.ti===(S.userSlot-1));
  const myPc=pc(myR);
  const mySt=stacks(myR);
  const topStk=Object.entries(mySt).sort((a,b)=>b[1]-a[1])[0];
  const ag=avgGrade(myPicks);
  const entry={
    id:Date.now(),
    date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),
    slot:S.userSlot,
    picks:myPicks.map(pk=>({
      round:roundOf(pk.n),overall:pk.n+1,
      id:pk.player.id,name:pk.player.name,pos:pk.player.pos,
      team:pk.player.team,adp:pk.player.adp,pr:pk.player.pr,
      grade:grade(pk.player,pk.n)
    })),
    build:`${myPc.QB}QB/${myPc.RB}RB/${myPc.WR}WR/${myPc.TE}TE`,
    avgGrade:ag,
    topStack:topStk?topStk[0]:'—',
    projPts:Math.round(myR.reduce((s,p)=>s+p.proj,0))
  };
  addToHistory(entry);
  render();
  // Show analysis modal after a beat
  setTimeout(()=>showAnalysis(entry),400);
}

// ── ANALYSIS MODAL ────────────────────────────────────────────
function showAnalysis(entry){
  const gradeColor={A:'var(--ga)',B:'var(--gb)',C:'var(--gc)',D:'var(--gd)'}[entry.avgGrade]||'var(--text2)';
  const gradeMsg={A:'Elite roster construction.',B:'Solid draft with good value.',C:'Average — some reaches hurt.',D:'Tough draft, lots of reaches.'}[entry.avgGrade]||'';
  const pickRows=entry.picks.map(pk=>{
    const diff=(pk.overall-pk.adp).toFixed(1);
    const diffStr=diff>0?'+'+diff:diff;
    const diffColor=diff<=-2?'var(--ga)':diff<=2?'var(--text2)':'var(--gd)';
    return`<div class="pick-log-row">
      <span style="color:var(--text3)">${pk.round}</span>
      <span><span class="pbadge ${pk.pos}">${pk.pos}</span></span>
      <span class="bold">${pk.name}</span>

// ── HISTORY PAGE ──────────────────────────────────────────────
function renderHistory(){
  const h=loadHistory();
  if(!h.length)return`<div class="history-page">
    <h2>Draft History</h2><p class="page-sub">Your mock draft analytics will appear here.</p>
    <div class="empty-history"><div class="ei">📋</div><p>No drafts yet. Run your first mock to start tracking your tendencies.</p></div>
  </div>`;

  // Aggregate stats
  const totalDrafts=h.length;
  const allPicks=h.flatMap(d=>d.picks);
  const aCount=allPicks.filter(p=>p.grade==='A').length;
  const bCount=allPicks.filter(p=>p.grade==='B').length;
  const valueRate=allPicks.length?Math.round((aCount+bCount)/allPicks.length*100):0;

  // Position pick frequency
  const posFreq={QB:0,RB:0,WR:0,TE:0};
  allPicks.forEach(p=>posFreq[p.pos]=(posFreq[p.pos]||0)+1);
  const total=allPicks.length||1;
  const posColor={QB:'var(--qb)',RB:'var(--rb)',WR:'var(--wr)',TE:'var(--te)'};

  // Early round (1-6) position tendencies
  const earlyPicks=allPicks.filter(p=>p.round<=6);
  const earlyFreq={QB:0,RB:0,WR:0,TE:0};
  earlyPicks.forEach(p=>earlyFreq[p.pos]=(earlyFreq[p.pos]||0)+1);
  const earlyTotal=earlyPicks.length||1;

  // Most drafted players
  const playerFreq={};
  allPicks.forEach(p=>{playerFreq[p.id]=(playerFreq[p.id]||{count:0,name:p.name,pos:p.pos,adp:p.adp,grades:[]});playerFreq[p.id].count++;playerFreq[p.id].grades.push(p.grade);});
  const topPlayers=Object.values(playerFreq).sort((a,b)=>b.count-a.count).slice(0,10);

  const avgProj=totalDrafts?Math.round(h.reduce((s,d)=>s+d.projPts,0)/totalDrafts):0;
  const gradeScore=g=>({A:4,B:3,C:2,D:1}[g]||2);
  const overallAvg=allPicks.length?allPicks.reduce((s,p)=>s+gradeScore(p.grade),0)/allPicks.length:2;
  const overallGrade=overallAvg>=3.5?'A':overallAvg>=2.5?'B':overallAvg>=1.5?'C':'D';
  const gradeColor={A:'var(--ga)',B:'var(--gb)',C:'var(--gc)',D:'var(--gd)'};

  const historyRows=h.slice(0,20).map((d,i)=>{
    const gc=gradeColor[d.avgGrade]||'var(--text2)';
    return`<div class="dht-row">
      <span>#${i+1}</span>
      <span class="bold">${d.date}</span>
      <span>Slot ${d.slot}</span>
      <span>${d.build}</span>
      <span><span class="grade-pill g${d.avgGrade}">${d.avgGrade}</span></span>
      <span style="color:var(--wr)">${d.topStack}</span>
    </div>`;
  }).join('');

  const ppRows=topPlayers.map(p=>{
    const avgG=p.grades;const gs=avgG.reduce((s,g)=>s+gradeScore(g),0)/avgG.length;
    const pg=gs>=3.5?'A':gs>=2.5?'B':gs>=1.5?'C':'D';
    const aRate=Math.round(avgG.filter(g=>g==='A').length/avgG.length*100);
    return`<div class="pp-row">
      <span class="pp-name">${p.name} <span class="pbadge ${p.pos}" style="margin-left:4px">${p.pos}</span></span>
      <span>${p.count}×</span>
      <span>ADP ${p.adp.toFixed(1)}</span>
      <span><span class="grade-pill g${pg}">${pg} avg</span></span>
      <span style="color:var(--ga)">${aRate}% A-grade</span>
    </div>`;
  }).join('');

  return`<div class="history-page">
    <h2>Draft History & Analytics</h2>
    <p class="page-sub">Tracking your pick tendencies across ${totalDrafts} mock draft${totalDrafts!==1?'s':''}.</p>
    <div class="stat-row">
      <div class="stat-card"><div class="stat-card-lbl">Drafts</div><div class="stat-card-val">${totalDrafts}</div><div class="stat-card-sub">Total mocks run</div></div>
      <div class="stat-card"><div class="stat-card-lbl">Overall Grade</div><div class="stat-card-val" style="color:${gradeColor[overallGrade]}">${overallGrade}</div><div class="stat-card-sub">Draft quality</div></div>
      <div class="stat-card"><div class="stat-card-lbl">Value Rate</div><div class="stat-card-val" style="color:var(--ga)">${valueRate}%</div><div class="stat-card-sub">A/B grade picks</div></div>
      <div class="stat-card"><div class="stat-card-lbl">Avg Proj Pts</div><div class="stat-card-val">${avgProj}</div><div class="stat-card-sub">Per draft</div></div>
      <div class="stat-card"><div class="stat-card-lbl">A-Grades</div><div class="stat-card-val" style="color:var(--ga)">${aCount}</div><div class="stat-card-sub">Value steals</div></div>
    </div>
    <div class="trend-grid">
      <div class="trend-card">
        <h4>Overall Position Distribution</h4>
        ${['QB','RB','WR','TE'].map(pos=>`<div class="trend-bar-row">
          <span class="trend-bar-label" style="color:${posColor[pos]}">${pos}</span>
          <div class="trend-bar-track"><div class="trend-bar-fill" style="width:${Math.round((posFreq[pos]||0)/total*100)}%;background:${posColor[pos]}"></div></div>
          <span class="trend-bar-pct">${Math.round((posFreq[pos]||0)/total*100)}%</span>
        </div>`).join('')}
      </div>
      <div class="trend-card">
        <h4>Early Rounds (1–6) Tendencies</h4>
        ${['QB','RB','WR','TE'].map(pos=>`<div class="trend-bar-row">
          <span class="trend-bar-label" style="color:${posColor[pos]}">${pos}</span>
          <div class="trend-bar-track"><div class="trend-bar-fill" style="width:${Math.round((earlyFreq[pos]||0)/earlyTotal*100)}%;background:${posColor[pos]}"></div></div>
          <span class="trend-bar-pct">${Math.round((earlyFreq[pos]||0)/earlyTotal*100)}%</span>
        </div>`).join('')}
      </div>
    </div>
    <div class="history-section-title">Most Drafted Players</div>
    <div class="player-prefs" style="margin-bottom:20px">
      <div class="pp-hdr"><span>Player</span><span>Drafted</span><span>ADP</span><span>Avg Grade</span><span>A-Grade Rate</span></div>
      ${ppRows||'<div style="padding:16px;color:var(--text3)">No data yet.</div>'}
    </div>
    <div class="history-section-title">Draft Log</div>
    <div class="draft-history-table">
      <div class="dht-hdr"><span>#</span><span>Date</span><span>Slot</span><span>Build</span><span>Grade</span><span>Top Stack</span></div>
      ${historyRows}
    </div>
    <div style="margin-top:12px;display:flex;gap:8px">
      <button class="btn btn-gold" onclick="navTo('draft')">⚑ Start New Draft</button>
      <button class="btn btn-danger" onclick="clearHistory()">🗑 Clear History</button>
    </div>
  </div>`;
}

  if(confirm('Clear all draft history?')){localStorage.removeItem('mb_history');navTo('history');}
}

function pListHTML(){
  const myR=S.rosters[S.userSlot-1],qt=qbTeams(myR),myTurn=isMyTurn()&&!S.aiRunning;
  // Apply pos + search filter across ALL players first
  const filtered=P.filter(p=>{
    if(S.filter!=='ALL'&&p.pos!==S.filter)return false;
    if(S.search){const q=S.search.toLowerCase();if(!p.name.toLowerCase().includes(q)&&!p.team.toLowerCase().includes(q))return false;}
    return true;
  });
  // Slice only the UNDRAFTED pool so late-round picks always appear
  const available=filtered.filter(p=>!S.drafted.has(p.id)).slice(0,120);
  const draftedShown=S.showDrafted?filtered.filter(p=>S.drafted.has(p.id)):[];
  const shown=[...available,...draftedShown];
  function rowHTML(p){
    const gone=S.drafted.has(p.id);
    const g=gone?'':grade(p,S.pickNum);
    const hasStk=!gone&&p.pos!=='QB'&&qt.has(p.team);
    const goneClass=gone?'gone vis':'';
    return`<div class="prow ${goneClass}" ${myTurn&&!gone?`onclick="userDraft('${p.id}')"`:''}>
      <span class="padp">${p.adp.toFixed(1)}</span>
      <span class="pbadge ${p.pos}">${p.pos}</span>
      <div class="pinfo"><div class="pname">${p.name}</div><div class="pteam">${p.pr} · ${p.team}</div></div>
      ${hasStk?'<span class="stk">STK</span>':''}
      ${!gone?`<span class="grade g${g}">${g}</span>`:''}
      <span class="pproj">${p.proj>0?Math.round(p.proj):'—'}</span>
    </div>`;
  }
  return shown.map(rowHTML).join('');
}

function renderMain(){
  const myR=S.rosters[S.userSlot-1],myPc=pc(myR),mySt=stacks(myR);
  const topStk=Object.entries(mySt).sort((a,b)=>b[1]-a[1])[0];
  const myTurn=isMyTurn()&&!S.aiRunning;
  const curTeam=S.done?-1:teamAt(S.pickNum);
  const round=roundOf(S.pickNum);

  // Status box
  let status;
  if(S.done){
    status=`<div class="pick-status" style="background:rgba(52,211,153,.04)">
      <div class="ps-eyebrow" style="color:var(--rb)">✅ DRAFT COMPLETE</div>
      <div class="ps-main" style="font-size:13px">${myPc.QB}QB · ${myPc.RB}RB · ${myPc.WR}WR · ${myPc.TE}TE</div>
      <div class="ps-sub">Analysis saved to history</div></div>`;
  }else if(myTurn){
    status=`<div class="pick-status ps-turn">
      <div class="ps-eyebrow" style="color:var(--rb)">🟢 YOUR PICK</div>
      <div class="ps-main">Round ${round} · Pick ${S.pickNum%TEAMS+1}</div>
      <div class="ps-sub">Overall #${S.pickNum+1} · ${avail().length} available</div></div>`;
  }else{
    const tn=S.teamNames[curTeam]||'Team '+(curTeam+1);
    status=`<div class="pick-status">
      <div class="ps-eyebrow" style="color:${S.aiRunning?'var(--te)':'var(--text3)'}">
        ${S.aiRunning?'🤖 AI PICKING':'⏳ ON THE CLOCK'}</div>
      <div class="ps-main">${tn}</div>
      <div class="ps-sub">Round ${round} · Overall #${S.pickNum+1}</div></div>`;
  }

  // Pick order strip
  const poHTML=Array.from({length:TEAMS},(_,i)=>{
    const isYou=i===(S.userSlot-1),isCur=!S.done&&i===curTeam&&!S.aiRunning;
    return`<div class="po${isYou?' po-you':''}${isCur&&!isYou?' po-cur':''}" title="${isYou?'YOU':S.teamNames[i]}">${isYou?'YOU':i+1}</div>`;
  }).join('');

  // Board — column-per-team
  const pbtr=Array.from({length:TEAMS},()=>Array(ROUNDS).fill(null));
  S.picks.forEach(pk=>{pbtr[pk.ti][Math.floor(pk.n/TEAMS)]=pk.player;});
  const clockTi=S.done?-1:teamAt(S.pickNum);
  const clockRound=S.done?-1:Math.floor(S.pickNum/TEAMS);

  let boardHTML='';
  for(let t=0;t<TEAMS;t++){
    const isYou=t===(S.userSlot-1);
    const tn=S.teamNames[t]||'Team '+(t+1);
    boardHTML+=`<div class="col-hdr${isYou?' you':''}">
      ${isYou?'YOU':'T'+(t+1)}
      <div class="team-name">${tn}</div>
    </div>`;
  }
  for(let r=0;r<ROUNDS;r++){
    for(let t=0;t<TEAMS;t++){
      const player=pbtr[t][r];
      const isYou=t===(S.userSlot-1);
      const isActive=!S.done&&t===clockTi&&r===clockRound;
      let cls='bcell';
      if(!player)cls+=' empty';
      if(isYou&&player)cls+=' mine';
      if(isActive)cls+=' onclock';
      boardHTML+=`<div class="${cls}">
        <div class="cell-rd">Rd ${r+1}</div>
        ${player?`<div class="cell-name">${player.name}</div>
        <span class="cell-badge ${player.pos}">${player.pos}</span>
        <div class="cell-adp">ADP ${player.adp.toFixed(1)}</div>`:''}
      </div>`;
    }
  }

  // Roster slots
  const used=new Set();
  // Fill starting slots first (positional), then bench (any pos)
  const starters=SLOTS.filter(s=>s.start);
  const bench=SLOTS.filter(s=>!s.start);
  // Assign starters positionally
  starters.forEach(slot=>{
    for(let i=0;i<myR.length;i++){if(!used.has(i)&&slot.p.includes(myR[i].pos)){slot._player=myR[i];used.add(i);break;}}
  });
  // Assign bench from remaining
  bench.forEach(slot=>{
    for(let i=0;i<myR.length;i++){if(!used.has(i)){slot._player=myR[i];used.add(i);break;}}
  });
  const rosterHTML=`
    <div class="rslot-divider">Starting Lineup</div>
    ${starters.map(slot=>`<div class="rslot starter">
      <span class="rslot-pos ${slot._player?slot._player.pos:''}">${slot.l}</span>
      ${slot._player
        ?`<div style="flex:1;min-width:0"><div class="rslot-name">${slot._player.name}</div><div class="rslot-team">${slot._player.team}</div></div>`
        :`<div class="rslot-name" style="color:var(--text3);font-style:italic">—</div>`}
    </div>`).join('')}
    <div class="rslot-divider" style="margin-top:4px">Bench</div>
    ${bench.map(slot=>`<div class="rslot bench">
      <span class="rslot-pos" style="color:var(--text3)">${slot.l}</span>
      ${slot._player
        ?`<div style="flex:1;min-width:0"><div class="rslot-name">${slot._player.name} <span class="pbadge ${slot._player.pos}" style="margin-left:3px;font-size:8px">${slot._player.pos}</span></div><div class="rslot-team">${slot._player.team}</div></div>`
        :`<div class="rslot-name" style="color:var(--text3);font-style:italic">—</div>`}
    </div>`).join('')}
  `;
  // Clear _player refs
  SLOTS.forEach(s=>delete s._player);

  const projTotal=Math.round(myR.reduce((s,p)=>s+p.proj,0));
  const buildPills=['QB','RB','WR','TE'].map(pos=>
    `<span class="build-pill ${pos}" style="background:var(--${pos.toLowerCase()}bg);color:var(--${pos.toLowerCase()})">${myPc[pos]}${pos}</span>`
  ).join('');

  return`<div class="main">
    <div class="left">
      ${status}
      <div class="po-row">${poHTML}</div>
      <div class="ctrl-row">
        <input type="text" placeholder="Search player or team..." id="srch" value="${S.search}" oninput="S.search=this.value;reList()">
      </div>
      <div class="ftabs">${['ALL','QB','RB','WR','TE'].map(f=>`<button class="ftab ${f}${S.filter===f?' on':''}" onclick="S.filter='${f}';reList()">${f}</button>`).join('')}</div>
      <div class="plist" id="plist">${pListHTML()}</div>
    </div>
    <div class="center">
      <div class="center-hdr">
        <span style="font-size:12px;font-weight:600;font-family:var(--ffh)">Draft Board</span>
        <span style="font-size:10px;color:var(--text2)">Each column = one team · Your picks highlighted</span>
        <span style="font-size:10px;color:var(--text2)">${S.done?'Complete ✅':'Pick '+(S.pickNum+1)+'/'+TOTAL}</span>
      </div>
      ${S.aiRunning?`<div class="ai-bar">🤖 AI making picks<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>`:''}
      <div class="board-wrap"><div class="board">${boardHTML}</div></div>
    </div>
    <div class="right">
      <div class="rp-hdr">
        <span class="rp-hdr-title">My Roster</span>
        <span style="font-size:10px;color:var(--text2)">${myR.length}/20</span>
      </div>
      <div class="rp-body">${rosterHTML}</div>
      <div class="sgrid">
        <div class="sc"><div class="sc-l">Drafted</div><div class="sc-v" style="color:var(--rb)">${myR.length}</div></div>
        <div class="sc"><div class="sc-l">Remaining</div><div class="sc-v">${20-myR.length}</div></div>
        <div class="sc" style="grid-column:1/-1"><div class="sc-l">Build</div><div class="build-pills">${buildPills}</div></div>
        <div class="sc"><div class="sc-l">Proj Pts</div><div class="sc-v" style="font-size:13px">${projTotal}</div></div>
        <div class="sc"><div class="sc-l">Top Stack</div><div class="sc-v" style="font-size:11px;color:var(--wr)">${topStk?topStk[0]+' ×'+topStk[1]:'—'}</div></div>
      </div>
    </div>
  </div>`;
}

function startDraft(slot){
  // Assign funny team names — user gets slot name "YOU", others get puns
  const shuffled=[...AI_NAMES].sort(()=>Math.random()-.5);
  const names=[];
  let aiIdx=0;
  for(let i=0;i<TEAMS;i++){
    names.push(i===(slot-1)?'YOU':shuffled[aiIdx++]||('Team '+(i+1)));
  }
  S={
    started:true,userSlot:slot,pickNum:0,picks:[],drafted:new Set(),
    rosters:Array.from({length:TEAMS},()=>[]),filter:'ALL',search:'',
    aiRunning:false,done:false,showDrafted:false,teamNames:names,page:'draft'
  };
  document.getElementById('tog-btn').textContent='👁 Drafted';
  document.getElementById('tog-btn').classList.remove('on');
  navTo('draft');
  if(!isMyTurn())setTimeout(runAI,300);
}
function resetDraft(){S.started=false;S.page='setup';render();}
render();
</script>
</body>
</html>
